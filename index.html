<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 팀 보드</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: #f4f5f7;
    color: #172b4d;
  }

  header.board-header {
    padding: 24px 32px;
    background: #ffffff;
    border-bottom: 1px solid #e4e6ea;
  }

  header.board-header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
  }

  main.board {
    display: flex;
    gap: 16px;
    padding: 24px 32px;
    align-items: flex-start;
    overflow-x: auto;
  }

  .column {
    background: #ebecf0;
    border-radius: 10px;
    width: 300px;
    min-width: 300px;
    padding: 12px;
    display: flex;
    flex-direction: column;
  }

  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 6px 12px;
  }

  .column-header h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
  }

  .column-header .count {
    background: #dcdfe4;
    color: #44546f;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .column[data-column="todo"] .column-header h2 { color: #b04632; }
  .column[data-column="doing"] .column-header h2 { color: #946f00; }
  .column[data-column="done"] .column-header h2 { color: #1f7a3f; }

  .column[data-column="todo"] { border-top: 4px solid #eb5a46; }
  .column[data-column="doing"] { border-top: 4px solid #f2c94c; }
  .column[data-column="done"] { border-top: 4px solid #4caf50; }

  .card-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: 0 1px 2px rgba(9, 30, 66, 0.2);
    font-size: 14px;
    line-height: 1.4;
    cursor: pointer;
    transition: box-shadow 0.15s ease;
  }

  .card:hover {
    box-shadow: 0 2px 6px rgba(9, 30, 66, 0.3);
  }

  .add-card-btn {
    margin-top: 10px;
    background: transparent;
    border: none;
    text-align: left;
    padding: 8px 6px;
    font-size: 14px;
    color: #44546f;
    border-radius: 6px;
    cursor: pointer;
  }

  .add-card-btn:hover {
    background: #dcdfe4;
    color: #172b4d;
  }
</style>
</head>
<body>

  <header class="board-header">
    <h1>우리 팀 보드</h1>
  </header>

  <main class="board">
    <section class="column" data-column="todo">
      <div class="column-header">
        <h2>할 일</h2>
        <span class="count" data-count="todo">0</span>
      </div>
      <div class="card-list" data-list="todo"></div>
      <button class="add-card-btn" type="button">+ 카드 추가</button>
    </section>

    <section class="column" data-column="doing">
      <div class="column-header">
        <h2>진행 중</h2>
        <span class="count" data-count="doing">0</span>
      </div>
      <div class="card-list" data-list="doing"></div>
      <button class="add-card-btn" type="button">+ 카드 추가</button>
    </section>

    <section class="column" data-column="done">
      <div class="column-header">
        <h2>완료</h2>
        <span class="count" data-count="done">0</span>
      </div>
      <div class="card-list" data-list="done"></div>
      <button class="add-card-btn" type="button">+ 카드 추가</button>
    </section>
  </main>

  <script>
    // 임시 데이터(나중에 Supabase로 교체)
    const boardData = {
      todo: [
        { title: "디자인 시안 검토" },
        { title: "회의록 정리" },
        { title: "다음 스프린트 계획 작성" }
      ],
      doing: [
        { title: "로그인 페이지 개발" },
        { title: "API 명세서 작성" }
      ],
      done: [
        { title: "킥오프 미팅 진행" },
        { title: "프로젝트 저장소 생성" },
        { title: "요구사항 정리" }
      ]
    };

    Object.keys(boardData).forEach(function (columnKey) {
      const listEl = document.querySelector('[data-list="' + columnKey + '"]');
      const countEl = document.querySelector('[data-count="' + columnKey + '"]');
      const cards = boardData[columnKey];

      cards.forEach(function (card) {
        const cardEl = document.createElement("div");
        cardEl.className = "card";
        cardEl.textContent = card.title;
        listEl.appendChild(cardEl);
      });

      countEl.textContent = cards.length;
    });
  </script>

</body>
</html>
