<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 팀 보드</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: #f4f5f7;
    color: #172b4d;
  }

  header.board-header {
    padding: 24px 32px;
    background: #ffffff;
    border-bottom: 1px solid #e4e6ea;
  }

  header.board-header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
  }

  main.board {
    display: flex;
    gap: 16px;
    padding: 24px 32px;
    align-items: flex-start;
    overflow-x: auto;
  }

  .column {
    background: #ebecf0;
    border-radius: 10px;
    width: 300px;
    min-width: 300px;
    padding: 12px;
    display: flex;
    flex-direction: column;
  }

  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 6px 12px;
  }

  .column-header h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
  }

  .column-header .count {
    background: #dcdfe4;
    color: #44546f;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .column[data-column="todo"] .column-header h2 { color: #b04632; }
  .column[data-column="doing"] .column-header h2 { color: #946f00; }
  .column[data-column="done"] .column-header h2 { color: #1f7a3f; }

  .column[data-column="todo"] { border-top: 4px solid #eb5a46; }
  .column[data-column="doing"] { border-top: 4px solid #f2c94c; }
  .column[data-column="done"] { border-top: 4px solid #4caf50; }

  .card-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: 0 1px 2px rgba(9, 30, 66, 0.2);
    font-size: 14px;
    line-height: 1.4;
    cursor: pointer;
    transition: box-shadow 0.15s ease;
  }

  .card:hover {
    box-shadow: 0 2px 6px rgba(9, 30, 66, 0.3);
  }

  .add-card-btn {
    margin-top: 10px;
    background: transparent;
    border: none;
    text-align: left;
    padding: 8px 6px;
    font-size: 14px;
    color: #44546f;
    border-radius: 6px;
    cursor: pointer;
  }

  .add-card-btn:hover {
    background: #dcdfe4;
    color: #172b4d;
  }

  .add-card-form {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .add-card-form textarea {
    resize: none;
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    box-shadow: 0 1px 2px rgba(9, 30, 66, 0.2);
    outline: 2px solid #4c9aff;
  }

  .add-card-form .form-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .add-card-form .confirm-btn {
    background: #0079bf;
    color: #ffffff;
    border: none;
    padding: 6px 12px;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
  }

  .add-card-form .confirm-btn:hover {
    background: #026aa7;
  }

  .add-card-form .cancel-btn {
    background: transparent;
    border: none;
    font-size: 20px;
    line-height: 1;
    color: #44546f;
    cursor: pointer;
    padding: 4px;
  }
</style>
</head>
<body>

  <header class="board-header">
    <h1>우리 팀 보드</h1>
  </header>

  <main class="board">
    <section class="column" data-column="todo">
      <div class="column-header">
        <h2>할 일</h2>
        <span class="count" data-count="todo">0</span>
      </div>
      <div class="card-list" data-list="todo"></div>
      <div class="add-card-area" data-add-area="todo">
        <button class="add-card-btn" type="button">+ 카드 추가</button>
      </div>
    </section>

    <section class="column" data-column="doing">
      <div class="column-header">
        <h2>진행 중</h2>
        <span class="count" data-count="doing">0</span>
      </div>
      <div class="card-list" data-list="doing"></div>
      <div class="add-card-area" data-add-area="doing">
        <button class="add-card-btn" type="button">+ 카드 추가</button>
      </div>
    </section>

    <section class="column" data-column="done">
      <div class="column-header">
        <h2>완료</h2>
        <span class="count" data-count="done">0</span>
      </div>
      <div class="card-list" data-list="done"></div>
      <div class="add-card-area" data-add-area="done">
        <button class="add-card-btn" type="button">+ 카드 추가</button>
      </div>
    </section>
  </main>

  <script>
    // 임시 데이터(나중에 Supabase로 교체)
    const boardData = {
      todo: [
        { title: "디자인 시안 검토" },
        { title: "회의록 정리" },
        { title: "다음 스프린트 계획 작성" }
      ],
      doing: [
        { title: "로그인 페이지 개발" },
        { title: "API 명세서 작성" }
      ],
      done: [
        { title: "킥오프 미팅 진행" },
        { title: "프로젝트 저장소 생성" },
        { title: "요구사항 정리" }
      ]
    };

    function addCardToDOM(columnKey, title) {
      const listEl = document.querySelector('[data-list="' + columnKey + '"]');
      const countEl = document.querySelector('[data-count="' + columnKey + '"]');

      const cardEl = document.createElement("div");
      cardEl.className = "card";
      cardEl.textContent = title;
      listEl.appendChild(cardEl);

      countEl.textContent = listEl.children.length;
    }

    function showAddCardForm(columnKey) {
      const areaEl = document.querySelector('[data-add-area="' + columnKey + '"]');

      const form = document.createElement("div");
      form.className = "add-card-form";
      form.innerHTML =
        '<textarea rows="2" placeholder="할 일 제목을 입력하세요"></textarea>' +
        '<div class="form-actions">' +
        '<button type="button" class="confirm-btn">확인</button>' +
        '<button type="button" class="cancel-btn" aria-label="취소">×</button>' +
        "</div>";

      areaEl.innerHTML = "";
      areaEl.appendChild(form);

      const textarea = form.querySelector("textarea");
      const confirmBtn = form.querySelector(".confirm-btn");
      const cancelBtn = form.querySelector(".cancel-btn");

      textarea.focus();

      function confirmAdd() {
        const title = textarea.value.trim();
        if (title !== "") {
          addCardToDOM(columnKey, title);
        }
        showAddCardButton(columnKey);
      }

      confirmBtn.addEventListener("click", confirmAdd);
      cancelBtn.addEventListener("click", function () {
        showAddCardButton(columnKey);
      });

      textarea.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          confirmAdd();
        } else if (event.key === "Escape") {
          showAddCardButton(columnKey);
        }
      });
    }

    function showAddCardButton(columnKey) {
      const areaEl = document.querySelector('[data-add-area="' + columnKey + '"]');
      areaEl.innerHTML = '<button class="add-card-btn" type="button">+ 카드 추가</button>';
      areaEl.querySelector(".add-card-btn").addEventListener("click", function () {
        showAddCardForm(columnKey);
      });
    }

    Object.keys(boardData).forEach(function (columnKey) {
      boardData[columnKey].forEach(function (card) {
        addCardToDOM(columnKey, card.title);
      });

      showAddCardButton(columnKey);
    });
  </script>

</body>
</html>
